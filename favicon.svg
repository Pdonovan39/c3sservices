<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="5" fill="#0D1117"/>

  <!--
    C3S icon: two overlapping rounded diamonds.
    Outer diamond (teal) shifted upper-left.
    Inner diamond (green) shifted lower-right.
    Together they create the layered 3-D look of the C3S logo mark.

    Diamond path with rounded corners using quadratic beziers:
      M = start point on edge near a vertex
      Q = round the vertex
      L = straight diagonal edge
  -->

  <!-- Outer diamond — teal #0ABFBF -->
  <path d="M 11,5  Q 14,2 17,5
           L 23,11 Q 26,14 23,17
           L 17,23 Q 14,26 11,23
           L  5,17 Q  2,14  5,11
           Z"
        fill="none" stroke="#0ABFBF" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Inner diamond — green #00A86B, offset 4px down-right -->
  <path d="M 15,9  Q 18,6 21,9
           L 27,15 Q 30,18 27,21
           L 21,27 Q 18,30 15,27
           L  9,21 Q  6,18  9,15
           Z"
        fill="none" stroke="#00A86B" stroke-width="2.2" stroke-linejoin="round"/>
</svg>
